version: '3'

# ─────────────────────────────────────────────────────────────────────────────
# Shared variable documentation
#
# This file is NOT meant to be included by other taskfiles.
# It exists solely to document the environment variables that all task modules
# rely on. These are loaded at runtime from .taskfile.env via the root
# Taskfile.yml's `dotenv:` directive — no re-declaration is needed in modules.
#
# To customise values, edit .taskfile.env (generated by scripts/install.sh).
# See .taskfile.env.example for a template with descriptions.
# ─────────────────────────────────────────────────────────────────────────────

vars:

  # ── Project ──────────────────────────────────────────────────────────────
  # NAMESPACE
  #   Used as the default Kubernetes namespace for kube:* and diagnostics:*
  #   tasks. Also used as the default project identifier.
  #   Source: .taskfile.env  |  Default: "my-project"
  NAMESPACE: "my-project"

  # ── AWS ──────────────────────────────────────────────────────────────────
  # AWS_REGION
  #   AWS region for all aws:* and kube:login:eks tasks.
  #   Source: .taskfile.env  |  Default: "eu-central-1"
  AWS_REGION: "eu-central-1"

  # AWS_PROFILE_DEV
  #   AWS SSO profile used by `task aws:login:dev`.
  #   Source: .taskfile.env
  AWS_PROFILE_DEV: ""

  # AWS_PROFILE_PLAY
  #   AWS SSO profile used by `task aws:login:play`. Optional.
  #   Source: .taskfile.env
  AWS_PROFILE_PLAY: ""

  # ── Kubernetes ───────────────────────────────────────────────────────────
  # KUBE_CONTEXT
  #   kubectl context used for kube:* and diagnostics:* tasks.
  #   Leave empty to use the currently active context.
  #   Source: .taskfile.env
  KUBE_CONTEXT: ""

  # ── Output ───────────────────────────────────────────────────────────────
  # OUTPUT_DIR
  #   Directory where diagnostics dumps and security scan results are written.
  #   Source: .taskfile.env  |  Default: ".diagnostics"
  OUTPUT_DIR: ".diagnostics"
